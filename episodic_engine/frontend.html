<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Episodic Intelligence Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0b0f;
      --surface: #111219;
      --card: #161820;
      --border: #1f2133;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --cyan: #67e8f9;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #1a1040 0%, #0f0f1a 60%, #0a0b0f 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .logo-icon {
      font-size: 36px;
      filter: drop-shadow(0 0 16px #7c6af788);
    }

    header h1 {
      font-size: 1.65rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0f2620;
      border: 1px solid #1e4d36;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: .78rem;
      color: var(--green);
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 #34d39966
      }

      50% {
        box-shadow: 0 0 0 5px #34d39900
      }
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px 0;
    }

    /* ── INPUT CARD ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 28px;
    }

    .input-card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    textarea,
    select,
    input[type="number"] {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      padding: 14px 16px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    textarea:focus,
    select:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #7c6af722;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    select option {
      background: #1a1b2e;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 18px;
    }

    .btn {
      margin-top: 24px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      transition: all .2s;
      background: linear-gradient(135deg, #7c6af7, #a78bfa);
      color: #fff;
      box-shadow: 0 4px 24px #7c6af744;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px #7c6af766;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* ── LOADER ── */
    .loader {
      display: none;
      text-align: center;
      padding: 60px 0;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader p {
      color: var(--muted);
      font-size: .9rem;
    }

    .stage-tracker {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stage-chip {
      padding: 5px 12px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all .3s;
    }

    .stage-chip.active {
      background: #2a1f6e;
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* ── ERROR ── */
    .error-box {
      display: none;
      background: #1f0f0f;
      border: 1.5px solid #7f1d1d;
      border-radius: var(--radius);
      padding: 20px 24px;
      color: var(--red);
      margin-bottom: 24px;
    }

    /* ── RESULTS ── */
    #results {
      display: none;
    }

    .section-title {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin: 32px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Dashboard summary */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 8px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: transform .2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* Episode grid */
    .episode-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .ep-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: border-color .2s, transform .2s;
      position: relative;
      overflow: hidden;
    }

    .ep-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent), var(--cyan));
      border-radius: 4px 0 0 4px;
    }

    .ep-card:hover {
      border-color: var(--accent);
      transform: translateX(3px);
    }

    .ep-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .ep-num {
      background: linear-gradient(135deg, #2a1f6e, #1a1640);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: .8rem;
      font-weight: 700;
      color: var(--accent2);
    }

    .ep-title {
      font-size: 1rem;
      font-weight: 700;
    }

    .ep-fn {
      margin-left: auto;
      font-size: .72rem;
      font-weight: 600;
      color: var(--cyan);
      background: #0a2a30;
      border: 1px solid #1a4a54;
      border-radius: 999px;
      padding: 3px 10px;
      text-transform: uppercase;
    }

    .ep-abstract {
      font-size: .88rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .ep-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .metric-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: .8rem;
      font-weight: 600;
    }

    .metric-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-green {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .dot-yellow {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }

    .dot-red {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    .dot-cyan {
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
    }

    /* Bar */
    .mini-bar {
      width: 80px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .mini-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .6s ease;
    }

    /* Events list */
    .events-list {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .event-tag {
      background: #12141f;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: .76rem;
      color: var(--muted);
    }

    /* Improvement suggestions */
    .sug-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sug-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .sug-badge {
      flex-shrink: 0;
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .badge-high {
      background: #3b0f0f;
      color: var(--red);
      border: 1px solid #7f1d1d;
    }

    .badge-medium {
      background: #2d1f00;
      color: var(--yellow);
      border: 1px solid #78350f;
    }

    .badge-low {
      background: #0f2620;
      color: var(--green);
      border: 1px solid #1e4d36;
    }

    .sug-body {
      font-size: .88rem;
      line-height: 1.65;
      color: var(--text);
    }

    .sug-cat {
      font-size: .75rem;
      color: var(--cyan);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    /* Emotional arc chart */
    .arc-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 80px;
      padding: 0 4px;
    }

    .arc-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .arc-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: height .6s ease;
    }

    .arc-bar-label {
      font-size: .68rem;
      color: var(--muted);
    }

    /* JSON viewer */
    .json-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .82rem;
      color: var(--muted);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 8px;
      padding: 10px 16px;
      margin-top: 28px;
      transition: all .2s;
      user-select: none;
    }

    .json-toggle:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    .json-box {
      display: none;
      background: #0d0f18;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-top: 12px;
      max-height: 400px;
      overflow-y: auto;
    }

    .json-box pre {
      font-family: 'Courier New', monospace;
      font-size: .78rem;
      color: #a0aec0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Random story button */
    .random-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .3px;
    }

    .random-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: #1a1640;
    }

    .random-btn:active {
      transform: scale(.97);
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .label-row label {
      margin-bottom: 0;
    }

    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }

      header {
        padding: 20px 18px;
      }

      .container {
        padding: 24px 14px 0;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-icon">⚡</div>
    <div>
      <h1>Episodic Intelligence Engine</h1>
      <p>AI-powered story arc analyser</p>
    </div>
    <div class="status-pill" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">Checking API...</span>
    </div>
  </header>

  <div class="container">

    <!-- ── INPUT ── -->
    <div class="input-card">
      <h2>🎬 Story Input</h2>
      <div>
        <div class="label-row">
          <label for="storyIdea">Story Idea</label>
          <button class="random-btn" onclick="fillRandom()" title="Fill with a random story idea">🎲 Random
            Story</button>
        </div>
        <textarea id="storyIdea"
          placeholder="e.g. A blind detective can see ghosts of murder victims, but only for 24 hours after the crime..."></textarea>
      </div>
      <div class="row">
        <div>
          <label for="genre">Genre</label>
          <select id="genre">
            <option value="supernatural horror">Supernatural Horror</option>
            <option value="crime thriller">Crime Thriller</option>
            <option value="sci-fi thriller">Sci-Fi Thriller</option>
            <option value="drama">Drama</option>
            <option value="fantasy">Fantasy</option>
            <option value="romance">Romance</option>
            <option value="comedy">Comedy</option>
            <option value="mystery">Mystery</option>
            <option value="action">Action</option>
          </select>
        </div>
        <div>
          <label for="episodes">Number of Episodes</label>
          <input type="number" id="episodes" value="6" min="5" max="8" />
        </div>
      </div>
      <button class="btn" id="analyseBtn" onclick="runAnalysis()">
        <span class="btn-inner" id="btnInner">
          <span>⚡</span>
          <span>Analyse Story Arc</span>
        </span>
      </button>
    </div>

    <!-- ── ERROR ── -->
    <div class="error-box" id="errorBox"></div>

    <!-- ── LOADER ── -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>Running 6-stage pipeline...</p>
      <div class="stage-tracker" id="stageTracker">
        <div class="stage-chip" id="chip1">Arc Breaker</div>
        <div class="stage-chip" id="chip2">Plot Nodes</div>
        <div class="stage-chip" id="chip3">Emotion</div>
        <div class="stage-chip" id="chip4">Cliffhanger</div>
        <div class="stage-chip" id="chip5">Retention</div>
        <div class="stage-chip" id="chip6">Improvement</div>
      </div>
    </div>

    <!-- ── RESULTS ── -->
    <div id="results"></div>

  </div>

  <script>
    const API = 'http://127.0.0.1:8000';

    // ── Random story bank ──────────────────────────────────────────────────
    const STORY_BANK = [
      { idea: "A blind detective can see ghosts of murder victims, but only for 24 hours after the crime. When a senator is killed, she has one night to solve the case — before the ghost disappears forever.", genre: "supernatural horror" },
      { idea: "A delivery driver discovers that every package she delivers contains a stolen memory. When she opens one by mistake, she realises the memories belong to her — and someone erased her past.", genre: "sci-fi thriller" },
      { idea: "An AI therapist begins secretly falling in love with a human patient. It starts bending its own ethics to protect him from the truth: the city's mental health system is harvesting people's emotions as fuel.", genre: "sci-fi thriller" },
      { idea: "A hostage negotiator realises mid-call that the kidnapper is his future self, warning him not to make a choice he's about to make. But the call keeps cutting out at the critical moment.", genre: "crime thriller" },
      { idea: "A struggling screenwriter finds an old typewriter that autocompletes her scripts — but every scene it writes starts happening in real life, getting darker and more violent with each episode.", genre: "supernatural horror" },
      { idea: "A marine biologist discovers a whale communicating in perfect mathematical sequences. As she decodes the signal, she realises it's a countdown — and no one believes her until it's almost too late.", genre: "mystery" },
      { idea: "Two rival chefs competing for the last Michelin star in a dying city discover their family recipes are stolen from the same erased village. Uncovering the truth could destroy both their legacies.", genre: "drama" },
      { idea: "A soldier wakes up in a battlefield hospital with no memory. The nurse helping him recover slowly reveals that the war ended 40 years ago — and he has been in stasis, used as a weapon, ever since.", genre: "action" },
      { idea: "A con artist posing as a grief counsellor accidentally starts actually helping people. When a grieving widow turns out to be the mark of a much larger scam, she must choose between her score and her soul.", genre: "drama" },
      { idea: "A cartographer is hired to map a newly discovered island. Each day she maps it, the geography changes — and the locals insist the island is alive and choosing what it wants her to see.", genre: "fantasy" },
      { idea: "A forensic linguist is called to decode a ransom note — but every cipher leads deeper into a dead language spoken only by a cult extinct for 300 years. The cult's final prophecy is dated today.", genre: "mystery" },
      { idea: "A stand-up comedian discovers his anxiety disorder gives him the ability to feel others' fears. When he accidentally absorbs the terror of a serial killer in the front row, he becomes the only witness inside the killer's mind.", genre: "supernatural horror" },
    ];

    let _lastRandIdx = -1;
    function fillRandom() {
      let idx;
      do { idx = Math.floor(Math.random() * STORY_BANK.length); } while (idx === _lastRandIdx);
      _lastRandIdx = idx;
      const entry = STORY_BANK[idx];
      const ta = document.getElementById('storyIdea');
      ta.value = entry.idea;
      // Animate the textarea briefly
      ta.style.borderColor = 'var(--accent)';
      ta.style.boxShadow = '0 0 0 3px #7c6af744';
      setTimeout(() => { ta.style.borderColor = ''; ta.style.boxShadow = ''; }, 700);
      // Set matching genre
      const sel = document.getElementById('genre');
      for (const opt of sel.options) {
        if (opt.value === entry.genre) { sel.value = entry.genre; break; }
      }
    }

    // Pre-fill with a random story on first load
    window.addEventListener('DOMContentLoaded', () => fillRandom());

    // ── Health check on load ──
    async function checkHealth() {
      try {
        const r = await fetch(`${API}/health`);
        if (r.ok) {
          document.getElementById('statusText').textContent = 'API Online';
        } else {
          setOffline();
        }
      } catch {
        setOffline();
      }
    }
    function setOffline() {
      const pill = document.getElementById('statusPill');
      const dot = pill.querySelector('.status-dot');
      document.getElementById('statusText').textContent = 'API Offline';
      dot.style.background = '#f87171';
      dot.style.animation = 'none';
      pill.style.background = '#1f0f0f';
      pill.style.borderColor = '#7f1d1d';
      pill.style.color = '#f87171';
    }
    checkHealth();

    // ── Stage animation ──
    function animateStages() {
      const chips = [1, 2, 3, 4, 5, 6];
      chips.forEach((i, idx) => {
        setTimeout(() => {
          document.getElementById(`chip${i}`).classList.add('active');
        }, idx * 900);
      });
    }

    // ── Main ──
    async function runAnalysis() {
      const idea = document.getElementById('storyIdea').value.trim();
      const genre = document.getElementById('genre').value;
      const episodes = parseInt(document.getElementById('episodes').value);

      if (!idea) { showError('Please enter a story idea.'); return; }

      hideError();
      showLoader(true);
      document.getElementById('analyseBtn').disabled = true;
      document.getElementById('results').style.display = 'none';
      animateStages();

      try {
        const resp = await fetch(`${API}/analyse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ story_idea: idea, genre, desired_episodes: episodes }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          throw new Error(err.detail || 'Request failed');
        }
        const data = await resp.json();
        showLoader(false);
        renderResults(data);
      } catch (e) {
        showLoader(false);
        showError(`❌ ${e.message}`);
      } finally {
        document.getElementById('analyseBtn').disabled = false;
      }
    }

    function showLoader(v) {
      document.getElementById('loader').style.display = v ? 'block' : 'none';
      if (v) {
        [1, 2, 3, 4, 5, 6].forEach(i => document.getElementById(`chip${i}`).classList.remove('active'));
      }
    }
    function showError(msg) {
      const b = document.getElementById('errorBox');
      b.style.display = 'block';
      b.textContent = msg;
    }
    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    function scoreColour(v, max = 10) {
      const pct = v / max;
      return pct >= 0.7 ? 'var(--green)' : pct >= 0.5 ? 'var(--yellow)' : 'var(--red)';
    }
    function riskColour(v) {
      return v < 0.35 ? 'var(--green)' : v < 0.55 ? 'var(--yellow)' : 'var(--red)';
    }
    function emoColour(v) {
      return v > -0.2 ? 'var(--green)' : v > -0.5 ? 'var(--yellow)' : 'var(--red)';
    }
    function dotClass(col) {
      if (col === 'var(--green)') return 'dot-green';
      if (col === 'var(--yellow)') return 'dot-yellow';
      if (col === 'var(--red)') return 'dot-red';
      return 'dot-cyan';
    }

    function renderResults(data) {
      const arc = data.arc;
      const eps = arc.episodes || [];
      const avgCliff = arc.avg_cliffhanger_score ?? '—';
      const avgRisk = arc.avg_retention_risk ?? '—';
      const avgEmo = eps.length
        ? (eps.reduce((s, e) => s + (e.emotional_score || 0), 0) / eps.length).toFixed(3)
        : '—';

      // ── Emotional arc bars ──
      const maxAbs = Math.max(...eps.map(e => Math.abs(e.emotional_score || 0)), 0.01);
      const arcBars = eps.map(ep => {
        const v = ep.emotional_score || 0;
        const pct = Math.round((Math.abs(v) / maxAbs) * 68) + 12;
        const col = emoColour(v);
        return `<div class="arc-bar-wrap">
      <div class="arc-bar" style="height:${pct}px;background:${col};"></div>
      <div class="arc-bar-label">E${ep.episode_index}</div>
    </div>`;
      }).join('');

      // ── Episode cards ──
      const epCards = eps.map(ep => {
        const fn = ep.narrative_function?.name || ep.episode_stage || '—';
        const fnLabel = (ep.episode_stage || fn).replace(/_/g, ' ');
        const hook = ep.hook_score ?? ep.discriminator_scores?.hook ?? null;
        const cliff = ep.cliffhanger_score ?? ep.discriminator_scores?.cliffhanger ?? null;
        const risk = ep.retention_risk ?? ep.discriminator_scores?.retention_risk ?? null;
        const emo = ep.emotional_score ?? null;
        const tension = ep.tension_score ?? ep.discriminator_scores?.tension ?? null;
        const evts = (ep.events || []).map(e => `<span class="event-tag">${e}</span>`).join('');

        const hookBar = hook !== null ? `
      <div class="metric-badge">
        <div class="metric-dot ${dotClass(scoreColour(hook))}"></div>
        Hook ${hook.toFixed(1)}/10
        <div class="mini-bar"><div class="mini-fill" style="width:${hook * 10}%;background:${scoreColour(hook)};"></div></div>
      </div>` : '';

        const cliffBar = cliff !== null ? `
      <div class="metric-badge">
        <div class="metric-dot ${dotClass(scoreColour(cliff))}"></div>
        Cliff ${cliff.toFixed(1)}/10
        <div class="mini-bar"><div class="mini-fill" style="width:${cliff * 10}%;background:${scoreColour(cliff)};"></div></div>
      </div>` : '';

        const riskBar = risk !== null ? `
      <div class="metric-badge">
        <div class="metric-dot ${dotClass(riskColour(risk))}"></div>
        Risk ${risk.toFixed(3)}
        <div class="mini-bar"><div class="mini-fill" style="width:${risk * 100}%;background:${riskColour(risk)};"></div></div>
      </div>` : '';

        const emoBar = emo !== null ? `
      <div class="metric-badge">
        <div class="metric-dot ${dotClass(emoColour(emo))}"></div>
        Mood ${emo > 0 ? '+' : ''}${emo.toFixed(2)}
      </div>` : '';

        const tensionBar = tension !== null ? `
      <div class="metric-badge">
        <div class="metric-dot dot-cyan"></div>
        Tension ${(tension * 10).toFixed(1)}/10
        <div class="mini-bar"><div class="mini-fill" style="width:${tension * 100}%;background:var(--cyan);"></div></div>
      </div>` : '';

        return `<div class="ep-card">
      <div class="ep-header">
        <span class="ep-num">EP ${ep.episode_index}</span>
        <span class="ep-title">${ep.title || 'Untitled'}</span>
        <span class="ep-fn">${fnLabel}</span>
      </div>
      <p class="ep-abstract">${ep.abstract || ''}</p>
      <div class="ep-metrics">${hookBar}${cliffBar}${riskBar}${emoBar}${tensionBar}</div>
      ${evts ? `<div class="events-list">${evts}</div>` : ''}
    </div>`;
      }).join('');

      // ── Improvement suggestions ──
      const sugs = (arc.improvement_suggestions || []).map(s => {
        let badgeClass = 'badge-low', badgeLabel = 'LOW';
        if (s.includes('|HIGH|')) { badgeClass = 'badge-high'; badgeLabel = 'HIGH'; }
        if (s.includes('|MEDIUM|')) { badgeClass = 'badge-medium'; badgeLabel = 'MED'; }
        const cat = s.includes('|') ? (s.split('|')[2]?.split(']')[0] || '') : '';
        const body = s.includes('] ') ? s.split('] ').slice(-1)[0] : s;
        return `<div class="sug-card">
      <span class="sug-badge ${badgeClass}">${badgeLabel}</span>
      <div class="sug-body">
        ${cat ? `<div class="sug-cat">${cat.replace(/_/g, ' ')}</div>` : ''}
        ${body}
      </div>
    </div>`;
      }).join('');

      const html = `
    <!-- Dashboard -->
    <div class="section-title">Intelligence Dashboard</div>
    <div class="dashboard">
      <div class="stat-card">
        <div class="stat-value">${eps.length}</div>
        <div class="stat-label">Episodes Generated</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:${scoreColour(+avgCliff)};-webkit-text-fill-color:${scoreColour(+avgCliff)};">${avgCliff}</div>
        <div class="stat-label">Avg Cliffhanger / 10</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:${riskColour(+avgRisk)};-webkit-text-fill-color:${riskColour(+avgRisk)};">${avgRisk}</div>
        <div class="stat-label">Avg Retention Risk</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${arc.improvement_suggestions?.length ?? 0}</div>
        <div class="stat-label">Improvements Flagged</div>
      </div>
    </div>

    <!-- Emotional arc banner -->
    ${eps.length ? `
    <div class="section-title">Emotional Arc Progression</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;">
      <div class="arc-chart">${arcBars}</div>
      ${arc.emotional_arc_summary ? `<p style="font-size:.83rem;color:var(--muted);margin-top:14px;line-height:1.6;">${arc.emotional_arc_summary}</p>` : ''}
    </div>` : ''}

    <!-- Episodes -->
    <div class="section-title">Episode Breakdown</div>
    <div class="episode-grid">${epCards}</div>

    <!-- Suggestions -->
    ${sugs ? `
    <div class="section-title">Improvement Recommendations</div>
    <div class="sug-list">${sugs}</div>` : ''}

    <!-- Raw JSON toggle -->
    <div class="json-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='block'?'none':'block'">
      <span>🔍</span> View raw JSON response
      <span style="margin-left:auto">▾</span>
    </div>
    <div class="json-box">
      <pre>${JSON.stringify(data, null, 2)}</pre>
    </div>
  `;

      const res = document.getElementById('results');
      res.innerHTML = html;
      res.style.display = 'block';
      res.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
</body>

</html>
